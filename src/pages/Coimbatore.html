<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coimbatore News Today</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: #f5f7fb;
}

/* HEADER */
.header {
  background: linear-gradient(135deg,#0f2b3d,#1b4a6e);
  color: white;
  padding: 30px 20px;
}

.header h1 {
  margin: 0;
}

.date {
  margin-top: 8px;
  opacity: 0.85;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* NEWS GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  margin-bottom: 8px;
}

.category {
  color: #f97316;
  font-weight: 600;
}

.time {
  background: #eef2f6;
  padding: 2px 8px;
  border-radius: 20px;
}

.card h3 {
  margin: 10px 0;
  font-size: 1.1rem;
}

.card p {
  font-size: 0.9rem;
  color: #444;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  background: #0f2b3d;
  color: #cbdde9;
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="header">
  <h1>📰 Coimbatore District News</h1>
  <div class="date" id="date"></div>
</div>

<div class="container">
  <h2>Latest Updates Today</h2>

  <div class="grid" id="news"></div>
</div>

<div class="footer">
  Live updates • Coimbatore • 2026
</div>

<script>
// SET DATE
const today = new Date();
document.getElementById("date").innerText =
  today.toLocaleDateString("en-IN", {
    weekday: "long",
    year: "numeric",
    month: "long",
    day: "numeric"
  });

// NEWS DATA (TODAY STYLE)
const news = [
  {
    title: "Metro Rail Project Gains Momentum in Coimbatore",
    desc: "State government reviews DPR; priority routes include Gandhipuram–SITRA corridor.",
    time: "9:40 AM",
    category: "Infrastructure"
  },
  {
    title: "Rain Alert Issued for Valparai and Pollachi Regions",
    desc: "IMD forecasts moderate rainfall in Western Ghats; public advised caution.",
    time: "7:15 AM",
    category: "Weather"
  },
  {
    title: "Coimbatore Among Top Clean Cities in India",
    desc: "Swachh ranking highlights city's waste management and sanitation systems.",
    time: "11:10 AM",
    category: "Civic"
  },
  {
    title: "Startup Summit 2026 Begins at CODISSIA",
    desc: "Entrepreneurs and investors gather to boost innovation ecosystem in Kovai.",
    time: "10:00 AM",
    category: "Business"
  },
  {
    title: "AI Research Hub Launched in Bharathiar University",
    desc: "New initiative focuses on smart farming and healthcare analytics.",
    time: "1:20 PM",
    category: "Education"
  },
  {
    title: "Textile Industry Sets ₹10,000 Crore Export Target",
    desc: "Manufacturers plan expansion and workforce training programs.",
    time: "3:30 PM",
    category: "Economy"
  }
];

// RENDER NEWS
const container = document.getElementById("news");

news.forEach(n => {
  container.innerHTML += `
    <div class="card">
      <div class="meta">
        <span class="time">${n.time}</span>
        <span class="category">${n.category}</span>
      </div>
      <h3>${n.title}</h3>
      <p>${n.desc}</p>
    </div>
  `;
});
</script>

</body>
</html>
